{% extends "base.html" %}
{% block title %}Skills{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Skills <span class="badge bg-secondary">{{ skills|length }}</span></h2>
</div>

<div class="row">
  {% for sk in skills %}
  <div class="col-6 col-md-3 col-lg-2 mb-2">
    <span class="badge bg-secondary p-2 w-100 text-start">
      <small class="text-muted">{{ sk.skill_id }}</small> {{ sk.name }}
    </span>
  </div>
  {% else %}
  <p class="text-muted">No skills found.</p>
  {% endfor %}
</div>
{% endblock %}
